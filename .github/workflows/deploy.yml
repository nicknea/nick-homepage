name: Deploy to mini PC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/dev/nick-homepage pull origin main

      - name: Install dependencies
        run: cd ~/dev/nick-homepage && npm install --prefer-offline

      - name: Build
        run: cd ~/dev/nick-homepage && npm run build

      - name: Reload Caddy
        run: sudo systemctl reload caddy
